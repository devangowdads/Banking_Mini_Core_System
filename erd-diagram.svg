<svg viewBox="0 0 640 880" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="640" height="880" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Banking Mini Core System — Entity Relationship Diagram</text>

  <!-- CUSTOMER -->
  <rect x="60" y="60" width="220" height="150" rx="8" fill="#eaf2ff" stroke="#3b6fd6" stroke-width="1.5"/>
  <rect x="60" y="60" width="220" height="32" rx="8" fill="#3b6fd6"/>
  <text x="170" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">CUSTOMER</text>
  <text x="74" y="108" font-size="12.5" fill="#1a1a1a">customer_id  <tspan fill="#b3331f" font-weight="bold">PK</tspan></text>
  <text x="74" y="126" font-size="12.5" fill="#1a1a1a">first_name, last_name</text>
  <text x="74" y="144" font-size="12.5" fill="#1a1a1a">email (unique), phone</text>
  <text x="74" y="162" font-size="12.5" fill="#1a1a1a">created_at, updated_at</text>
  <text x="74" y="184" font-size="11.5" fill="#5a6472" font-style="italic">owns 1..* accounts</text>

  <!-- ACCOUNT -->
  <rect x="360" y="280" width="220" height="170" rx="8" fill="#eafff1" stroke="#1f9e5a" stroke-width="1.5"/>
  <rect x="360" y="280" width="220" height="32" rx="8" fill="#1f9e5a"/>
  <text x="470" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">ACCOUNT</text>
  <text x="374" y="328" font-size="12.5" fill="#1a1a1a">account_id  <tspan fill="#b3331f" font-weight="bold">PK</tspan></text>
  <text x="374" y="346" font-size="12.5" fill="#1a1a1a">customer_id  <tspan fill="#946200" font-weight="bold">FK</tspan></text>
  <text x="374" y="364" font-size="12.5" fill="#1a1a1a">account_number (unique)</text>
  <text x="374" y="382" font-size="12.5" fill="#1a1a1a">account_type, balance, status</text>
  <text x="374" y="400" font-size="12.5" fill="#1a1a1a">version  <tspan fill="#5a6472" font-style="italic">(optimistic lock)</tspan></text>
  <text x="374" y="418" font-size="12.5" fill="#1a1a1a">created_at, updated_at</text>
  <text x="374" y="440" font-size="11.5" fill="#5a6472" font-style="italic">records 1..* transactions</text>

  <!-- TRANSACTION -->
  <rect x="60" y="500" width="220" height="190" rx="8" fill="#fff7e6" stroke="#c98a13" stroke-width="1.5"/>
  <rect x="60" y="500" width="220" height="32" rx="8" fill="#c98a13"/>
  <text x="170" y="522" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">TRANSACTION</text>
  <text x="74" y="548" font-size="12.5" fill="#1a1a1a">transaction_id  <tspan fill="#b3331f" font-weight="bold">PK</tspan></text>
  <text x="74" y="566" font-size="12.5" fill="#1a1a1a">account_id  <tspan fill="#946200" font-weight="bold">FK</tspan></text>
  <text x="74" y="584" font-size="12.5" fill="#1a1a1a">transaction_type, amount</text>
  <text x="74" y="602" font-size="12.5" fill="#1a1a1a">balance_after, status</text>
  <text x="74" y="620" font-size="12.5" fill="#1a1a1a">transfer_ref_id  <tspan fill="#5a6472" font-style="italic">(pairs transfer legs)</tspan></text>
  <text x="74" y="638" font-size="12.5" fill="#1a1a1a">created_at, updated_at</text>
  <text x="74" y="660" font-size="11.5" fill="#5a6472" font-style="italic">generates 0..* audit logs</text>

  <!-- AUDIT_LOG -->
  <rect x="360" y="720" width="220" height="140" rx="8" fill="#fdeaf2" stroke="#c2347c" stroke-width="1.5"/>
  <rect x="360" y="720" width="220" height="32" rx="8" fill="#c2347c"/>
  <text x="470" y="742" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">AUDIT_LOG</text>
  <text x="374" y="768" font-size="12.5" fill="#1a1a1a">audit_id  <tspan fill="#b3331f" font-weight="bold">PK</tspan></text>
  <text x="374" y="786" font-size="12.5" fill="#1a1a1a">transaction_id  <tspan fill="#946200" font-weight="bold">FK</tspan></text>
  <text x="374" y="804" font-size="12.5" fill="#1a1a1a">action, performed_by</text>
  <text x="374" y="822" font-size="12.5" fill="#1a1a1a">details</text>
  <text x="374" y="840" font-size="12.5" fill="#1a1a1a">created_at, updated_at</text>

  <!-- Relationship lines -->
  <path d="M 280 135 C 330 135, 330 280, 360 330" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="200" font-size="11" fill="#444">1 owns *</text>

  <path d="M 360 380 C 280 420, 280 460, 280 500" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="460" font-size="11" fill="#444">1 records *</text>

  <path d="M 280 590 C 340 650, 340 690, 360 740" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="680" font-size="11" fill="#444">1 generates 0..*</text>

  <text x="320" y="876" text-anchor="middle" font-size="11" fill="#777">PK = primary key · FK = foreign key · arrows point from "one" side to "many" side</text>
</svg>
